services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/pianonic/chopped-ranking:local
    container_name: chopped-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      ALLOWED_ORIGINS: "*"
      MAX_UPLOAD_BYTES: "10485760"
      TORCH_NUM_THREADS: "2"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/pianonic/chopped-ranking-web:local
    container_name: chopped-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true
