name: Build Android APK and attach to release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (android)
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --no-install --clean

      - name: Tune Gradle JVM
        run: |
          cat >> frontend/android/gradle.properties <<'EOF'

          # CI-only Gradle tuning (appended after expo prebuild)
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.configureondemand=true
          EOF
        working-directory: ${{ github.workspace }}
        shell: bash

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Assemble debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          set -e
          path="$(ls frontend/android/app/build/outputs/apk/debug/*.apk | head -n 1)"
          version="${{ github.event.release.tag_name }}"
          if [ -z "$version" ]; then version="manual-$(date -u +%Y%m%d%H%M)"; fi
          cp "$path" "chopped-${version}.apk"
          echo "path=chopped-${version}.apk" >> "$GITHUB_OUTPUT"
          echo "name=chopped-${version}.apk" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}
        shell: bash

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
